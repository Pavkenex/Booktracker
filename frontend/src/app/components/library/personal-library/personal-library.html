<div class="container mt-4">
  <div class="row">
    <div class="col-12">
      <h2 class="mb-4">
        <i class="fas fa-book-open me-2"></i>My Personal Library
      </h2>
    </div>
  </div>

  <!-- Library Statistics -->
  <div class="row mb-4">
    <div class="col-12">
      <app-library-stats></app-library-stats>
    </div>
  </div>

  <!-- Filter Tabs -->
  <div class="row mb-4">
    <div class="col-12">
      <app-library-tab-bar
        [activeTab]="activeTab"
        [counts]="tabCounts"
        (tabChange)="setActiveTab($event)"
      ></app-library-tab-bar>
    </div>
  </div>

  <!-- Books Display -->
  <div class="row">
    <div class="col-12">
      <div class="tab-content" id="libraryTabContent">
        <app-library-book-grid
          [books]="filteredBooks"
          [loading]="loading"
          [activeTab]="activeTab"
          (statusChanged)="onStatusChanged($event)"
          (toggleFavorite)="toggleFavorite($event)"
          (review)="openReviewForm($event)"
          (remove)="removeBook($event)"
        ></app-library-book-grid>
      </div>
    </div>
  </div>
</div>

<!-- Review Form Modal -->
@if (selectedBookForReview) {
<app-review-form
  [userBook]="selectedBookForReview"
  (reviewSubmitted)="onReviewSubmitted($event)"
  (modalClosed)="closeReviewForm()"
>
</app-review-form>
}
