<ng-container *ngIf="books.length; else emptyState">
  <div class="row g-4">
    <div
      class="col-lg-4 col-md-6"
      *ngFor="let userBook of books; trackBy: trackByBook"
    >
      <div class="card h-100 book-card">
        <div class="card-body d-flex gap-3">
          <a
            [routerLink]="['/books', userBook.book.id]"
            class="cover-wrapper"
            title="View book details"
          >
            <img
              [src]="userBook.book.thumbnail || placeholder"
              [alt]="userBook.book.title"
              width="80"
              height="120"
            />
          </a>
          <div class="flex-grow-1 d-flex flex-column">
            <h6 class="card-title mb-1">{{ userBook.book.title }}</h6>
            <p class="text-muted small mb-2">by {{ userBook.book.author }}</p>

            <div class="mb-2">
              <span class="badge" [ngClass]="getStatusBadgeClass(userBook.status)">
                {{ getStatusLabel(userBook.status) }}
              </span>
              <span class="badge bg-warning text-dark ms-1" *ngIf="userBook.isFavourite">
                <i class="fas fa-heart me-1"></i>Favorite
              </span>
            </div>

            <div class="text-warning mb-2" *ngIf="userBook.rating">
              <ng-container *ngFor="let _ of getFilledStars(userBook.rating)">
                <i class="fas fa-star"></i>
              </ng-container>
              <ng-container *ngFor="let _ of getEmptyStars(userBook.rating)">
                <i class="far fa-star"></i>
              </ng-container>
            </div>

            <p class="review text-muted small mb-0" *ngIf="userBook.review">
              <strong>Review:</strong>
              <span>{{ userBook.review }}</span>
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #emptyState>
  <div class="empty-state text-center py-5">
    <i class="fas fa-book-open fa-3x text-muted mb-3"></i>
    <h4 class="text-muted">No books in library</h4>
    <p class="text-muted mb-0">
      This reader hasn't added any books to their library yet.
    </p>
  </div>
</ng-template>
