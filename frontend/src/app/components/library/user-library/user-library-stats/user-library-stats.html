<ng-container *ngIf="!loading && stats; else loadingState">
  <div class="row g-3">
    <div class="col-sm-6 col-xl-3" *ngFor="let card of [
      { label: 'Total Books', value: stats.total, variant: 'primary', icon: 'fas fa-book-open' },
      { label: 'Completed', value: stats.read, variant: 'success', icon: 'fas fa-check-circle' },
      { label: 'Currently Reading', value: stats.currentlyReading, variant: 'warning', icon: 'fas fa-book-reader' },
      { label: 'Want to Read', value: stats.toRead, variant: 'info', icon: 'fas fa-lightbulb' }
    ]">
      <div class="card text-white h-100" [ngClass]="'bg-' + card.variant">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <h4 class="card-title mb-1">{{ card.value }}</h4>
            <p class="card-text small mb-0">{{ card.label }}</p>
          </div>
          <i [class]="card.icon + ' fa-2x opacity-75 d-none d-md-block'"></i>
        </div>
      </div>
    </div>
  </div>
</ng-container>

<ng-template #loadingState>
  <div class="row g-3">
    <div class="col-sm-6 col-xl-3" *ngFor="let _ of [1,2,3,4]">
      <div class="card skeleton h-100">
        <div class="card-body">
          <div class="placeholder-glow">
            <span class="placeholder col-6 mb-2"></span>
            <span class="placeholder col-4"></span>
          </div>
        </div>
      </div>
    </div>
  </div>
</ng-template>
