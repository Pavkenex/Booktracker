<div class="container mt-4 user-library-page">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="page-title">
      <i class="fas fa-book-open me-2"></i>
      {{ userName }}'s Library
    </h2>
    <button class="btn btn-outline-secondary" (click)="goBack()">
      <i class="fas fa-arrow-left me-2"></i>Back
    </button>
  </div>

  @if (isLoading) {
  <div class="text-center py-5">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
    <p class="mt-3">Loading library...</p>
  </div>
  }

  @if (error) {
  <div class="alert alert-danger" role="alert">
    <i class="fas fa-exclamation-triangle me-2"></i>
    {{ error }}
  </div>
  }

  @if (!isLoading && !error) {
  <div class="library-content">
    <app-user-library-stats [stats]="stats" [loading]="isLoading"></app-user-library-stats>
    <app-user-library-books [books]="books"></app-user-library-books>
  </div>
  }
</div>
