<!-- Mobile dropdown for tabs -->
<div class="d-md-none mb-3">
  <select
    class="form-select"
    [value]="activeTab"
    (change)="onMobileChange($event)"
  >
    <option value="all">All Books ({{ counts.all }})</option>
    <option value="to_read">Want to Read ({{ counts.to_read }})</option>
    <option value="currently_reading">Currently Reading ({{ counts.currently_reading }})</option>
    <option value="read">Read ({{ counts.read }})</option>
    <option value="favorites">Favorites ({{ counts.favorites }})</option>
  </select>
</div>

<!-- Desktop tabs -->
<ul class="nav nav-tabs d-none d-md-flex" role="tablist">
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      [class.active]="activeTab === 'all'"
      type="button"
      (click)="onSelect('all')"
    >
      <span class="d-none d-lg-inline">All Books</span>
      <span class="d-inline d-lg-none">All</span>
      ({{ counts.all }})
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      [class.active]="activeTab === 'to_read'"
      type="button"
      (click)="onSelect('to_read')"
    >
      <span class="d-none d-lg-inline">Want to Read</span>
      <span class="d-inline d-lg-none">To Read</span>
      ({{ counts.to_read }})
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      [class.active]="activeTab === 'currently_reading'"
      type="button"
      (click)="onSelect('currently_reading')"
    >
      <span class="d-none d-lg-inline">Currently Reading</span>
      <span class="d-inline d-lg-none">Reading</span>
      ({{ counts.currently_reading }})
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      [class.active]="activeTab === 'read'"
      type="button"
      (click)="onSelect('read')"
    >
      Read ({{ counts.read }})
    </button>
  </li>
  <li class="nav-item" role="presentation">
    <button
      class="nav-link"
      [class.active]="activeTab === 'favorites'"
      type="button"
      (click)="onSelect('favorites')"
    >
      <i class="fas fa-heart me-1 d-md-none"></i>
      <span class="d-none d-md-inline">Favorites</span>
      <span class="d-inline d-md-none">Fav</span>
      ({{ counts.favorites }})
    </button>
  </li>
</ul>
