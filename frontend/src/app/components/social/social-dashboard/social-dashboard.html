<div class="social-dashboard">
  <div class="social-wrapper container-xxl">
    <aside class="social-sidebar">
      <header class="sidebar-header">
        <div>
          <h2 class="sidebar-title">Social Hub</h2>
          <p class="sidebar-subtitle">Catch up with friends and share your latest reads.</p>
        </div>
        <div class="sidebar-metrics">
          <span class="metric-pill" *ngIf="notificationCount.friendRequests > 0">
            <i class="fas fa-user-plus me-1"></i>
            {{ notificationCount.friendRequests }} new
          </span>
        </div>
      </header>

      <nav class="sidebar-tabs" role="tablist">
        <button
          type="button"
          class="sidebar-tab"
          [class.active]="sidebarTab === 'friends'"
          (click)="setSidebarTab('friends')">
          <span><i class="fas fa-users me-2"></i>Friends</span>
        </button>
        <button
          type="button"
          class="sidebar-tab"
          [class.active]="sidebarTab === 'requests'"
          (click)="setSidebarTab('requests')">
          <span><i class="fas fa-user-plus me-2"></i>Friend Requests</span>
          <span class="badge" [class.bg-danger]="notificationCount.friendRequests > 0">
            {{ notificationCount.friendRequests }}
          </span>
        </button>
      </nav>

      <section class="sidebar-content" role="tabpanel">
        @if (sidebarTab === 'friends') {
          <app-friends-list></app-friends-list>
        }
        @if (sidebarTab === 'requests') {
          <app-friend-requests></app-friend-requests>
        }
      </section>
    </aside>

    <main class="social-content">
      <div class="content-card">
        <app-recommendations></app-recommendations>
      </div>
    </main>
  </div>
</div>
