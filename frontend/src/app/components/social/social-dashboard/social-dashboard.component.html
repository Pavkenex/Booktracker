<div class="social-dashboard">
  <div class="container-fluid">
    <div class="row">
      <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-4">
          <h2>Social Features</h2>
          <div class="social-stats">
            <span class="badge bg-primary me-2" *ngIf="notificationCount.friendRequests > 0">
              {{ notificationCount.friendRequests }} Friend Request{{ notificationCount.friendRequests > 1 ? 's' : '' }}
            </span>
            <span class="badge bg-success" *ngIf="notificationCount.recommendations > 0">
              {{ notificationCount.recommendations }} Recommendation{{ notificationCount.recommendations > 1 ? 's' : '' }}
            </span>
          </div>
        </div>

        <!-- Navigation Tabs -->
        <ul class="nav nav-tabs nav-fill mb-4">
          <li class="nav-item">
            <button 
              class="nav-link" 
              [class.active]="activeTab === 'friends'"
              (click)="setActiveTab('friends')">
              <i class="fas fa-users me-2"></i>
              My Friends
            </button>
          </li>
          <li class="nav-item">
            <button 
              class="nav-link position-relative" 
              [class.active]="activeTab === 'requests'"
              (click)="setActiveTab('requests')">
              <i class="fas fa-user-plus me-2"></i>
              Friend Requests
              <span 
                *ngIf="notificationCount.friendRequests > 0" 
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                {{ notificationCount.friendRequests }}
              </span>
            </button>
          </li>
          <li class="nav-item">
            <button 
              class="nav-link position-relative" 
              [class.active]="activeTab === 'recommendations'"
              (click)="setActiveTab('recommendations')">
              <i class="fas fa-book me-2"></i>
              Recommendations
              <span 
                *ngIf="notificationCount.recommendations > 0" 
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-success">
                {{ notificationCount.recommendations }}
              </span>
            </button>
          </li>
        </ul>

        <!-- Tab Content -->
        <div class="tab-content">
          <div *ngIf="activeTab === 'friends'" class="tab-pane fade show active">
            <app-friends-list></app-friends-list>
          </div>
          
          <div *ngIf="activeTab === 'requests'" class="tab-pane fade show active">
            <app-friend-requests></app-friend-requests>
          </div>
          
          <div *ngIf="activeTab === 'recommendations'" class="tab-pane fade show active">
            <app-recommendations></app-recommendations>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
