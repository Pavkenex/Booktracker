<div class="loading-container" [class]="containerClass">
  <!-- Spinner variant -->
  @if (variant === 'spinner') {
  <div class="spinner-border" [class]="spinnerClass" role="status">
    <span class="visually-hidden">{{ message }}</span>
  </div>
  }

  <!-- Dots variant -->
  @if (variant === 'dots') {
  <div class="loading-dots" [class]="dotsClass">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  }

  <!-- Pulse variant -->
  @if (variant === 'pulse') {
  <div class="loading-pulse" [class]="pulseClass">
    <div class="pulse-circle"></div>
  </div>
  }

  <!-- Loading message -->
  @if (showMessage) {
  <p class="loading-message" [class]="messageClass">{{ message }}</p>
  }
</div>
