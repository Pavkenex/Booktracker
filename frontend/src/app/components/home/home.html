<div class="container mt-4">
  <app-home-hero
    [isAuthenticated$]="isAuthenticated$"
    [currentUser$]="currentUser$"
  ></app-home-hero>

  <div class="row mt-5">
    <div class="col-12">
      <app-popular-books-section></app-popular-books-section>
    </div>
  </div>

  @if (isAuthenticated$ | async) {
  <div class="row mt-5">
    <div class="col-12">
      <app-home-recommendations
        [recommendations]="recentRecommendations"
        [loading]="isLoadingRecommendations"
        (markAsRead)="markAsRead($event)"
      ></app-home-recommendations>
    </div>
  </div>
  }

  <div class="row mt-5">
    <div class="col-12">
      <app-home-feature-grid></app-home-feature-grid>
    </div>
  </div>
</div>
