@if (similarBooks.length > 0) {
<div class="similar-section mt-5">
  <h3 class="mb-3">Similar Books</h3>
  <app-slider
    [items]="similarBooks"
    [trackBy]="trackByBookId"
    [itemsPerSlideConfig]="sliderItemsConfig"
    [breakpoints]="sliderBreakpoints"
    slideGap="clamp(0.5rem, 2vw, 1rem)"
    [trackMinHeight]="260"
  >
    <ng-template appSliderItem let-book>
      <button
        type="button"
        class="similar-item"
        (click)="onNavigateToBook(book.id)"
      >
        <div class="thumb-wrapper">
          <img [src]="book.thumbnail" [alt]="book.title" appFallbackImage />
        </div>
        <div class="similar-book-info">
          <div class="similar-book-title" [title]="book.title">
            {{ book.title }}
          </div>
          <div class="similar-book-author" [title]="book.author">
            {{ book.author }}
          </div>
        </div>
      </button>
    </ng-template>
  </app-slider>
</div>
}
